<!DOCTYPE html>
<html>
<head>
    <title>Payment Page</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            padding: 50px;
        }

        .box {
            background: white;
            padding: 30px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            color: #333;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            background: green;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>ABC Institute Payment</h2>

    <input type="text" placeholder="Enter Name"><br>
    <input type="email" placeholder="Enter Email"><br>

    <select>
        <option>Select Course</option>
        <option>BCA - ₹500</option>
        <option>BBA - ₹700</option>
        <option>MCA - ₹1000</option>
    </select>

    <br><br>

    <!-- Replace link below -->
    <a href="https://rzp.io/rzp/1kUXw1x" target="_blank">
        <button>Pay Now</button>
    </a>
</div>

</body>
</html>
